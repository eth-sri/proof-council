model: claude-fable-5
api: anthropic
max_tokens: 128000
concurrent_requests: 32
temperature: null
top_p: null
cache_write_cost: 12.5
cache_read_cost: 1.0
read_cost: 10
write_cost: 50
# Fable 5 always thinks: adaptive is the only accepted explicit config
# (budget_tokens or type: disabled are rejected with a 400).
thinking:
  type: adaptive
  display: omitted
output_config:
  effort: max
cache_control:
  type: ephemeral
batch_processing: false
stream_anthropic_messages: true
anthropic_salvage_empty_max_tokens: true
anthropic_continue_on_max_tokens: true
# Use Anthropic streaming for long adaptive-thinking calls, with a
# 30-minute total cap for the council seat.
timeout: 1800
max_wallclock_per_call_s: 1800
max_retries: 1
max_retries_inner: 1
sleep_on_error: 10
sleep_on_error_max: 60
