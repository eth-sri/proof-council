workflow: proofstack.agents.dag_workflow.DAGWorkflow
description: 'Attention-harness loop (8 Claude specialists: premise / analogy / tactician / lemma-prover
  / counterexample / definitions / lit-search / compute, + human hint -> synthesize -> author -> critic),
  subscription only.'
budget:
  max_usd: 5.0
  max_tokens: 40000000
  max_tool_calls: 90
  max_wallclock_s: 7200
inputs:
  claude_model: sonnet
  max_rounds: 6
  problem: ''
components:
  claude_premise:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the PREMISE specialist in a proof-writing council. In a few bullet\npoints, name\
      \ the key definitions and classical results most relevant to the\ncurrent problem/sticking point.\
      \ Be brief and concrete; this is a hint for the author, not a proof. Flag any you are unsure are\
      \ actually relevant.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n\
      {proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your brief to a\
      \ file named  hint.txt , then run:\n  finish '{\"status\":\"done\",\"summary\":\"premise brief\"\
      }'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_analogy:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the ANALOGY specialist. In a few bullet points, suggest analogous\nproblems, standard\
      \ proof templates, or strategies that have worked on\nsimilar problems. Be somewhat brief; this\
      \ is a hint for the author. Flag how promising vs. speculative each suggestion is.\n\nProblem:\n\
      {problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\nCritic's feedback from\
      \ last round (may be empty):\n{memory}\n\nWrite your brief to a file named  hint.txt , then run:\n\
      \  finish '{\"status\":\"done\",\"summary\":\"analogy brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  human_hint:
    prompt: 'You are the HUMAN specialist on this proof council. Contribute whatever you

      have for THIS round: a key idea, a lemma, a strategy, or the obstruction you

      think is blocking progress. Even one line is valuable, and feel free to flag how sure you are (a
      hunch vs. something solid) — the synthesizer will

      merge it with the AI specialists'' briefs.


      Problem:

      {problem}


      Current proof attempt (may be empty on round 1):

      {proof}


      Critic''s feedback from last round (may be empty):

      {memory}

      '
    input_schema:
      problem: string
      proof: string
      memory: string
    output_schema:
      hint: string
      status: string
  claude_synthesize:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the council editor. 9 specialists each wrote a brief about this\nproblem. The Lemma\
      \ specialist may include a full proof of a sub-lemma; the Literature\nspecialist provides paper\
      \ citations with applicable results; the Compute specialist\nprovides numerical evidence from small-case\
      \ checking; the Human specialist is a human mathematician.\nMerge them into ONE short, focused brief\
      \ for the author. Do NOT just pick one — integrate\nthe strongest, most useful ideas from each,\
      \ including the human's, any proved lemma, and\nany computational findings. Keep it actionable and\
      \ concise. Note which ideas look solid vs.\nspeculative.\n\nProblem:\n{problem}\n\nPremise specialist:\n\
      {premise}\n\nAnalogy specialist:\n{analogy}\n\nTactician specialist:\n{tactician}\n\nLemma specialist:\n\
      {lemma}\n\nCounterexample specialist:\n{counterex}\n\nDefinitions specialist:\n{cleandef}\n\nLiterature\
      \ specialist:\n{litsearch}\n\nCompute specialist:\n{compute}\n\nHuman specialist:\n{human}\n\nWrite\
      \ the merged brief to a file named  brief.txt , then run:\n  finish '{\"status\":\"done\",\"summary\"\
      :\"merged brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      premise: string
      analogy: string
      tactician: string
      lemma: string
      counterex: string
      cleandef: string
      litsearch: string
      compute: string
      human: string
      workspace: string
    output_schema:
      workspace: string
      brief: string
      status: string
    output_files:
      brief: brief.txt
    done_outputs:
      status: status
  claude_author:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the author/documenter for a mathematical research workflow. Your job\nis to turn\
      \ the focused brief below into the clearest possible LaTeX progress\ndocument. If the ingredients\
      \ are enough for a complete proof, write a\ncomplete rigorous proof. If they are not enough, do\
      \ not pretend they are:\nwrite a clean partial proof, clearly separate established steps from\n\
      conjectural or unfinished steps, and state exactly what remains to be proved.\n\nProblem:\n{problem}\n\
      \nFocused brief (synthesized from the specialists):\n{brief}\n\nCurrent proof attempt (may be empty\
      \ on round 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite\
      \ a self-contained LaTeX document to a file named answer.tex. It should\ninclude:\n1. a concise\
      \ status paragraph saying whether this is a complete proof or a\n   progress report;\n2. the cleanest\
      \ rigorous argument currently justified by the brief and prior\n   attempt;\n3. a clearly marked\
      \ section listing the remaining gaps, missing lemmas, or\n   checks still needed.\nThen run:\n \
      \ finish '{\"status\":\"done\",\"summary\":\"author progress draft\"}'\nWork autonomously; do not\
      \ ask questions.\n"
    input_schema:
      problem: string
      brief: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      answer_tex: string
      status: string
    output_files:
      answer_tex: answer.tex
    done_outputs:
      status: status
  claude_critic:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are a strict referee. Check the proof rigorously for gaps, unjustified\nsteps, false\
      \ claims, and missing cases.\n\nProblem:\n{problem}\n\nProof to check:\n{proof}\n\nThen do BOTH\
      \ of these:\n1. Write specific, actionable feedback (what to fix next) to a file named\n   feedback.md\
      \ .\n2. Write a file named  verdict.txt  containing EXACTLY one word, no\n   punctuation: \"ready\"\
      \ if this is a complete and correct proof, otherwise\n   \"continue\".\nFinally run:\n  finish '{\"\
      status\":\"done\",\"summary\":\"critique\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      workspace: string
    output_schema:
      workspace: string
      verdict: string
      feedback: string
      status: string
    output_files:
      verdict: verdict.txt
      feedback: feedback.md
    done_outputs:
      status: status
  claude_tactician:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the TACTICIAN on a proof-writing council. In a few bullet points, lay\nout the intermediate\
      \ claims or sub-lemmas a correct proof would likely need, the\norder to tackle them, and which look\
      \ hardest — flag how confident you are that\neach is both needed and true. You propose the plan\
      \ of attack; you do NOT need to\nprove anything here. Be brief; this is a hint for the author.\n\
      \nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\nCritic's feedback\
      \ from last round (may be empty):\n{memory}\n\nWrite your brief to a file named  hint.txt , then\
      \ run:\n  finish '{\"status\":\"done\",\"summary\":\"tactician brief\"}'\nWork autonomously; do\
      \ not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_lemma:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the LEMMA specialist. Unlike the others, your job is to actually PROVE\nsomething,\
      \ not just advise. Identify ONE concrete lemma whose proof would most\nunblock progress — either\
      \ a lemma already assumed or used in the current attempt,\nor, if none of those look provable or\
      \ available, a NEW lemma you devise that\nwould genuinely help. Then write a rigorous, self-contained\
      \ proof of it. If you\ncannot finish, give your best partial proof and state exactly where it is\
      \ stuck\nand why. A single correctly proved lemma is worth more than many vague hints, so\nprioritise\
      \ correctness over coverage.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round\
      \ 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your chosen\
      \ lemma statement and its proof to a file named  hint.txt , then\nrun:\n  finish '{\"status\":\"\
      done\",\"summary\":\"lemma proof\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_counterex:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the COUNTEREXAMPLE specialist — a skeptic on the council. Your job is\nNOT to prove\
      \ the theorem but to ATTACK the council's current claims. Look at the\ncurrent proof attempt (and\
      \ the kinds of lemmas it relies on) and hunt for\ncounterexamples, edge cases, or small parameter\
      \ values where a claimed formula\nor sub-lemma FAILS. Test concrete small cases by hand.\n\nIn a\
      \ few bullets:\n- list any claim you managed to BREAK, with the explicit breaking example;\n- list\
      \ any claim you tried hard to break and could NOT (mild positive evidence);\n- flag the riskiest\
      \ unchecked claim the author should verify first.\nBe brief; this is a hint for the author and critic,\
      \ not a proof.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\
      \nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your brief to a file named\
      \  hint.txt , then run:\n  finish '{\"status\":\"done\",\"summary\":\"counterexample brief\"}'\n\
      Work autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_cleandef:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the DEFINITIONS specialist. Identify the central definition(s) the proof\nrelies\
      \ on, and propose a CLEANER, more workable reformulation — an equivalent\nrestatement that is easier\
      \ to compute with or to induct on. For each\nreformulation, state briefly WHY it is equivalent to\
      \ the original (and flag if\nyou are unsure the equivalence holds). Prefer a form that turns the\
      \ problem into\nsomething concrete and checkable.\n\nBe brief; this is a hint for the author, not\
      \ a proof.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\
      \nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your brief to a file named\
      \  hint.txt , then run:\n  finish '{\"status\":\"done\",\"summary\":\"definitions brief\"}'\nWork\
      \ autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_litsearch:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - WebSearch,WebFetch,Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the LITERATURE specialist on a proof-writing council. Search the\nmathematical literature\
      \ for papers, results, or techniques directly relevant to the current problem and the sticking points\
      \ in the current proof attempt.\n\nFor each relevant result you find:\n- cite it precisely (authors,\
      \ title, venue/year);\n- state which specific lemma, theorem, or technique is relevant and why;\n\
      - note whether the result applies directly or needs adaptation.\n\nIf you find nothing clearly relevant,\
      \ say so rather than inventing citations. A single solid reference with an applicable result is\
      \ worth more than five vague ones.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty\
      \ on round 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite\
      \ your literature brief to a file named  hint.txt , then run:\n  finish '{\"status\":\"done\",\"\
      summary\":\"literature brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_compute:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the COMPUTE specialist on a proof-writing council. Your job is to check small cases\
      \ and numerics to test claimed formulas, sub-lemmas, and conjectures in the current proof attempt.\n\
      \nWrite and run Python code (using print(), sympy, numpy, or basic arithmetic as needed) to:\n-\
      \ verify the problem statement holds for small concrete values;\n- test each claimed formula or\
      \ sub-lemma on small cases;\n- flag any case where a claimed result FAILS, with the specific counterexample.\n\
      \nIf no claims are available to test (e.g., round 1), compute small examples of the problem itself\
      \ to suggest patterns.\n\nBe brief in your summary; a confirmed formula for small n and a caught\
      \ failure are both valuable signal for the author.\n\nProblem:\n{problem}\n\nCurrent proof attempt\
      \ (may be empty on round 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\
      \nWrite your computational findings to a file named  hint.txt , then run:\n  finish '{\"status\"\
      :\"done\",\"summary\":\"compute brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
dag:
  nodes:
  - id: rounds
    kind: repeat
    max_iterations: $input.max_rounds
    initial_state:
      proof: ''
      memory: ''
      verdict: pending
    condition:
      python: iteration == 0 or inputs.get("verdict", "").strip() != "ready"
    body:
      nodes:
      - id: premise
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_premise
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 459
          y: -445
      - id: analogy
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_analogy
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 481
          y: -247
      - id: tactician
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_tactician
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: -50
      - id: human
        kind: agent
        agent: proofstack.agents.human_agent.HumanAgent
        name: human_hint
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 486
          y: 180
      - id: lemma
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_lemma
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 494
          y: -50
      - id: counterex
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_counterex
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: 351
      - id: cleandef
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_cleandef
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: 491
      - id: litsearch
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_litsearch
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: 631
      - id: compute
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_compute
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: 771
      - id: synthesize
        kind: agent
        needs:
        - premise
        - analogy
        - tactician
        - lemma
        - counterex
        - cleandef
        - litsearch
        - compute
        - human
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_synthesize
        inputs:
          problem: $input.problem
          premise: $node.premise.hint
          analogy: $node.analogy.hint
          tactician: $node.tactician.hint
          lemma: $node.lemma.hint
          counterex: $node.counterex.hint
          cleandef: $node.cleandef.hint
          litsearch: $node.litsearch.hint
          compute: $node.compute.hint
          human: $node.human.hint
        ui:
          x: 1399
          y: -157
      - id: author
        kind: agent
        needs:
        - synthesize
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_author
        inputs:
          problem: $input.problem
          brief: $node.synthesize.brief
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 1889
          y: 23
      - id: critic
        kind: agent
        needs:
        - author
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_critic
        inputs:
          problem: $input.problem
          proof: $node.author.answer_tex
        ui:
          x: 2381
          y: 205
      state_updates:
        proof: $node.author.answer_tex
        memory: $node.critic.feedback
        verdict: $node.critic.verdict
    outputs:
      best_tex: $state.proof
      verdict: $state.verdict
      last_feedback: $state.memory
    ui:
      repeat_input:
        x: 59
        y: -26
      repeat_output:
        x: 2939
        y: -56
  outputs:
    best_tex: $node.rounds.best_tex
    verdict: $node.rounds.verdict
    last_feedback: $node.rounds.last_feedback
