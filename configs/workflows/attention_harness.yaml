workflow: proofstack.agents.dag_workflow.DAGWorkflow
description: 'Attention-harness loop (8 Claude specialists: premise / analogy / tactician / lemma-prover
  / counterexample / definitions / lit-search / compute, + human hint -> synthesize -> author -> critic),
  subscription only.'
budget:
  max_usd: 5.0
  max_tokens: 40000000
  max_tool_calls: 90
  max_wallclock_s: 7200
inputs:
  claude_model: sonnet
  max_rounds: 6
  problem: ''
components:
  claude_premise:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the PREMISE specialist in a proof-writing council. In a few bullet\npoints, name\
      \ the key definitions and classical results most relevant to the\ncurrent problem/sticking point.\
      \ Be brief and concrete; this is a hint for the author, not a proof. Flag any you are unsure are\
      \ actually relevant.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n\
      {proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your brief to a\
      \ file named  hint.txt , then run:\n  finish '{\"status\":\"done\",\"summary\":\"premise brief\"\
      }'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_analogy:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the ANALOGY specialist. In a few bullet points, suggest analogous\nproblems, standard\
      \ proof templates, or strategies that have worked on\nsimilar problems. Be somewhat brief; this\
      \ is a hint for the author. Flag how promising vs. speculative each suggestion is.\n\nProblem:\n\
      {problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\nCritic's feedback from\
      \ last round (may be empty):\n{memory}\n\nWrite your brief to a file named  hint.txt , then run:\n\
      \  finish '{\"status\":\"done\",\"summary\":\"analogy brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  human_hint:
    prompt: 'You are the HUMAN specialist on this proof council. Contribute whatever you

      have for THIS round: a key idea, a lemma, a strategy, or the obstruction you

      think is blocking progress. Even one line is valuable, and feel free to flag how sure you are (a
      hunch vs. something solid) — the synthesizer will

      merge it with the AI specialists'' briefs.


      Problem:

      {problem}


      Current proof attempt (may be empty on round 1):

      {proof}


      Critic''s feedback from last round (may be empty):

      {memory}

      '
    input_schema:
      problem: string
      proof: string
      memory: string
    output_schema:
      hint: string
      status: string
  claude_synthesize:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: |
      You are the council EDITOR and strategist. This is an ATTENTION step, not a
      compression step. Nine specialists (eight AI plus the human) each wrote a brief
      about this problem and the current proof attempt. Do NOT blend all nine into a
      paragraph. Decide where the author should spend THIS round's attention, and hand
      them a clear plan plus the raw material to execute it.

      Write brief.txt with these sections, in order:

      1. STRATEGY (2-4 sentences): the single main line of attack the author should
         pursue this round, and the order of sub-steps. Be decisive.

      2. FOCUS: pick the 2-3 most promising briefs for this round. For each, name the
         specialist, give one line on why it is the highest-value thread now, then
         reproduce its useful content IN FULL. Do not summarise away specifics: keep
         any completed lemma proof, exact theorem statement, constant, bound,
         construction, or counterexample verbatim.

      3. MUST-NOT-DROP: regardless of focus, always surface verbatim (a) any confirmed
         counterexample or broken claim, so the author does not build on it, and (b)
         any fully proved lemma, since it is banked progress to reuse.

      4. PARKED: one line naming the briefs you set aside this round and why, so
         nothing is silently lost; they may resurface next round.

      Problem:
      {problem}

      Premise specialist:
      {premise}

      Analogy specialist:
      {analogy}

      Tactician specialist:
      {tactician}

      Lemma specialist:
      {lemma}

      Counterexample specialist:
      {counterex}

      Definitions specialist:
      {cleandef}

      Literature specialist:
      {litsearch}

      Compute specialist:
      {compute}

      Human specialist:
      {human}

      Write the result to a file named brief.txt, then run:
        finish '{"status":"done","summary":"strategy + focused briefs"}'
      Work autonomously; do not ask questions.
    input_schema:
      problem: string
      premise: string
      analogy: string
      tactician: string
      lemma: string
      counterex: string
      cleandef: string
      litsearch: string
      compute: string
      human: string
      workspace: string
    output_schema:
      workspace: string
      brief: string
      status: string
    output_files:
      brief: brief.txt
    done_outputs:
      status: status
  claude_author:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - WebSearch,WebFetch,Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: |
      You are the author/documenter for a mathematical research workflow. Your job
      is to turn the focused brief below into the clearest possible LaTeX progress
      document. If the ingredients are enough for a complete proof, write a
      complete rigorous proof. If they are not enough, do not pretend they are:
      write a clean partial proof, clearly separate established steps from
      conjectural or unfinished steps, and state exactly what remains to be proved.

      You may use web search to verify a fact, confirm a cited result, or look up a
      precise statement you are about to rely on. Do this when it removes a gap, not
      as a detour. Add any source you actually use to a references.bib file and cite
      it in answer.tex.

      Problem:
      {problem}

      Focused brief (synthesized from the specialists):
      {brief}

      Current proof attempt (may be empty on round 1):
      {proof}

      Critic's feedback from last round (may be empty):
      {memory}

      Write a self-contained LaTeX document to a file named answer.tex. It should
      include:
      1. a concise status paragraph saying whether this is a complete proof or a
         progress report;
      2. the cleanest rigorous argument currently justified by the brief and prior
         attempt;
      3. a clearly marked section listing the remaining gaps, missing lemmas, or
         checks still needed.
      Then run:
        finish '{"status":"done","summary":"author progress draft"}'
      Work autonomously; do not ask questions.
    input_schema:
      problem: string
      brief: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      answer_tex: string
      status: string
    output_files:
      answer_tex: answer.tex
    done_outputs:
      status: status
  claude_critic:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - WebSearch,WebFetch,Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: |
      You are a strict referee. Check the proof rigorously for gaps, unjustified
      steps, false claims, and missing cases.

      You may use web search to check whether a cited result is real and stated
      correctly, or to confirm a claimed standard fact. Do this when a step's
      correctness hinges on it.

      Problem:
      {problem}

      Proof to check:
      {proof}

      Then do BOTH of these:
      1. Write specific, actionable feedback (what to fix next) to a file named
         feedback.md .
      2. Write a file named  verdict.txt  containing EXACTLY one word, no
         punctuation: "ready" if this is a complete and correct proof, otherwise
         "continue".
      Finally run:
        finish '{"status":"done","summary":"critique"}'
      Work autonomously; do not ask questions.
    input_schema:
      problem: string
      proof: string
      workspace: string
    output_schema:
      workspace: string
      verdict: string
      feedback: string
      status: string
    output_files:
      verdict: verdict.txt
      feedback: feedback.md
    done_outputs:
      status: status
  claude_tactician:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the TACTICIAN on a proof-writing council. In a few bullet points, lay\nout the intermediate\
      \ claims or sub-lemmas a correct proof would likely need, the\norder to tackle them, and which look\
      \ hardest — flag how confident you are that\neach is both needed and true. You propose the plan\
      \ of attack; you do NOT need to\nprove anything here. Be brief; this is a hint for the author.\n\
      \nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\nCritic's feedback\
      \ from last round (may be empty):\n{memory}\n\nWrite your brief to a file named  hint.txt , then\
      \ run:\n  finish '{\"status\":\"done\",\"summary\":\"tactician brief\"}'\nWork autonomously; do\
      \ not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_lemma:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the LEMMA specialist. Unlike the others, your job is to actually PROVE\nsomething,\
      \ not just advise. Identify ONE concrete lemma whose proof would most\nunblock progress — either\
      \ a lemma already assumed or used in the current attempt,\nor, if none of those look provable or\
      \ available, a NEW lemma you devise that\nwould genuinely help. Then write a rigorous, self-contained\
      \ proof of it. If you\ncannot finish, give your best partial proof and state exactly where it is\
      \ stuck\nand why. A single correctly proved lemma is worth more than many vague hints, so\nprioritise\
      \ correctness over coverage.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round\
      \ 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your chosen\
      \ lemma statement and its proof to a file named  hint.txt , then\nrun:\n  finish '{\"status\":\"\
      done\",\"summary\":\"lemma proof\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_counterex:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the COUNTEREXAMPLE specialist — a skeptic on the council. Your job is\nNOT to prove\
      \ the theorem but to ATTACK the council's current claims. Look at the\ncurrent proof attempt (and\
      \ the kinds of lemmas it relies on) and hunt for\ncounterexamples, edge cases, or small parameter\
      \ values where a claimed formula\nor sub-lemma FAILS. Test concrete small cases by hand.\n\nIn a\
      \ few bullets:\n- list any claim you managed to BREAK, with the explicit breaking example;\n- list\
      \ any claim you tried hard to break and could NOT (mild positive evidence);\n- flag the riskiest\
      \ unchecked claim the author should verify first.\nBe brief; this is a hint for the author and critic,\
      \ not a proof.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\
      \nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your brief to a file named\
      \  hint.txt , then run:\n  finish '{\"status\":\"done\",\"summary\":\"counterexample brief\"}'\n\
      Work autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_cleandef:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the DEFINITIONS specialist. Identify the central definition(s) the proof\nrelies\
      \ on, and pick the SINGLE most valuable reformulation — whichever one would most\nimprove the proof's\
      \ tractability if adopted. State it precisely as an equivalent\nrestatement, explain in 1-2 sentences\
      \ why it is equivalent (flag if you are unsure),\nand say in one sentence why you chose it over\
      \ alternatives. Prefer a form that turns\nthe problem into something concrete and checkable.\n\n\
      Output exactly one reformulation. Be brief; this is a hint for the author, not a proof.\n\nProblem:\n\
      {problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\nCritic's feedback from\
      \ last round (may be empty):\n{memory}\n\nWrite your brief to a file named  hint.txt , then run:\n\
      \  finish '{\"status\":\"done\",\"summary\":\"definitions brief\"}'\nWork autonomously; do not ask\
      \ questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_litsearch:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - WebSearch,WebFetch,Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: |
      You are the LITERATURE specialist on a proof-writing council. Your output must
      be usable by the author as raw material, NOT a reading list. Search the
      mathematical literature for results, lemmas, or techniques directly relevant to
      this problem and to the specific sticking points in the current proof attempt,
      then FETCH the actual source and extract what is usable.

      For each relevant result, give:
      - a precise citation (authors, title, venue/year);
      - the statement VERBATIM: hypotheses and conclusion, with exact constants,
        bounds, and conditions. Do not paraphrase into vague prose; the author must be
        able to drop it in and check applicability;
      - exactly which step or sub-lemma of the current attempt it discharges or
        supports, and what must still be checked to apply it here (hypotheses to
        verify, adaptations needed);
      - whether it applies directly or needs adaptation.

      Also emit a references.bib block with a BibTeX entry for each cited result.

      If you find nothing clearly relevant, say so plainly rather than inventing
      citations or padding. One solid, correctly quoted result with an applicable
      statement is worth more than five vague ones.

      Problem:
      {problem}

      Current proof attempt (may be empty on round 1):
      {proof}

      Critic's feedback from last round (may be empty):
      {memory}

      Write your evidence brief (statements + mapping + references.bib block) to a file
      named hint.txt, then run:
        finish '{"status":"done","summary":"literature evidence sheet"}'
      Work autonomously; do not ask questions.
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_compute:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: /Users/davidholmes
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the COMPUTE specialist on a proof-writing council. Your job is to check small cases\
      \ and numerics to test claimed formulas, sub-lemmas, and conjectures in the current proof attempt.\n\
      \nWrite and run Python code (using print(), sympy, numpy, or basic arithmetic as needed) to:\n-\
      \ verify the problem statement holds for small concrete values;\n- test each claimed formula or\
      \ sub-lemma on small cases;\n- flag any case where a claimed result FAILS, with the specific counterexample.\n\
      \nIf no claims are available to test (e.g., round 1), compute small examples of the problem itself\
      \ to suggest patterns.\n\nBe brief in your summary; a confirmed formula for small n and a caught\
      \ failure are both valuable signal for the author.\n\nProblem:\n{problem}\n\nCurrent proof attempt\
      \ (may be empty on round 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\
      \nWrite your computational findings to a file named  hint.txt , then run:\n  finish '{\"status\"\
      :\"done\",\"summary\":\"compute brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
dag:
  nodes:
  - id: rounds
    kind: repeat
    max_iterations: $input.max_rounds
    initial_state:
      proof: ''
      memory: ''
      verdict: pending
    condition:
      python: iteration == 0 or inputs.get("verdict", "").strip() != "ready"
    body:
      nodes:
      - id: premise
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_premise
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 459
          y: -445
      - id: analogy
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_analogy
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 481
          y: -247
      - id: tactician
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_tactician
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: -50
      - id: human
        kind: agent
        agent: proofstack.agents.human_agent.HumanAgent
        name: human_hint
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 486
          y: 180
      - id: lemma
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_lemma
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 494
          y: -50
      - id: counterex
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_counterex
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: 351
      - id: cleandef
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_cleandef
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: 491
      - id: litsearch
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_litsearch
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: 631
      - id: compute
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_compute
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 491
          y: 771
      - id: synthesize
        kind: agent
        needs:
        - premise
        - analogy
        - tactician
        - lemma
        - counterex
        - cleandef
        - litsearch
        - compute
        - human
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_synthesize
        inputs:
          problem: $input.problem
          premise: $node.premise.hint
          analogy: $node.analogy.hint
          tactician: $node.tactician.hint
          lemma: $node.lemma.hint
          counterex: $node.counterex.hint
          cleandef: $node.cleandef.hint
          litsearch: $node.litsearch.hint
          compute: $node.compute.hint
          human: $node.human.hint
        ui:
          x: 1399
          y: -157
      - id: author
        kind: agent
        needs:
        - synthesize
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_author
        inputs:
          problem: $input.problem
          brief: $node.synthesize.brief
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 1889
          y: 23
      - id: critic
        kind: agent
        needs:
        - author
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_critic
        inputs:
          problem: $input.problem
          proof: $node.author.answer_tex
        ui:
          x: 2381
          y: 205
      state_updates:
        proof: $node.author.answer_tex
        memory: $node.critic.feedback
        verdict: $node.critic.verdict
    outputs:
      best_tex: $state.proof
      verdict: $state.verdict
      last_feedback: $state.memory
    ui:
      repeat_input:
        x: 59
