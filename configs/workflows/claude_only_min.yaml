# Minimal Claude-only workflow.
# Goal: run a single problem end-to-end on a Claude Max *subscription* (the
# `claude` CLI), with NO API keys and NO Docker (subprocess sandbox on the host).
# This is a "hello world" to prove the subscription path works before building
# anything fancier (e.g. a Claude author + one Codex node for diversity).
#
# The two formerly-open questions are resolved (verified against the runtime
# source and by direct experiment on this machine):
#   1. Headless + least privilege: `-p` reads the piped prompt from stdin and
#      exits. Instead of the blunt --dangerously-skip-permissions, we use
#      `--permission-mode acceptEdits` (auto-approve file writes) plus
#      `--allowedTools Bash(finish:*)` (the ONLY shell command it may run is
#      `finish`). Everything else is auto-denied in headless mode.
#   2. The subprocess sandbox does NOT inherit ~/.claude — it pins HOME to the
#      sandbox root (src/proofstack/sandbox/base.py), which makes the CLI report
#      "Not logged in". The subscription login is keyed to the REAL HOME (the
#      OAuth token lives in the macOS Keychain, gated on the real home dir).
#      So we override HOME back to David's home via the component `env:` block
#      below; that is the only setting that authenticates.
#   SAFETY NOTE: HOME points at the real home, so the worker can *read* files
#   under ~ in principle. But it can only *write* via the Write tool and can run
#   no shell command except `finish`, so it cannot delete files, exfiltrate over
#   the network, or run arbitrary code. Good enough for a trusted machine; for
#   stronger isolation, give the node its own logged-in HOME instead of ~.
workflow: proofstack.agents.dag_workflow.DAGWorkflow
description: Claude + Codex dual-solver with a Claude synthesizer that merges the best of each (subscription, no API key, no Docker).

budget:
  max_usd: 0.0            # no API spend expected; gate on wallclock instead
  max_wallclock_s: 1800

# Per-run model knobs. Override from the CLI with e.g.
#   --input claude_model=haiku --input codex_effort=low
# or from the web UI's "Workflow Inputs" tab. Defaults are the SERIOUS-run
# (top) settings; switch to the cheap values for testing the council on
# problems weak models actually struggle with.
inputs:
  problem: ''
  # Claude solver + referee model: opus (serious) | sonnet | haiku (cheap test).
  claude_model: opus
  # Codex solver model. A ChatGPT-account Codex login supports the base GPT
  # models but NOT the *-codex variants. Verified working: gpt-5.5 (top),
  # gpt-5.4, gpt-5.4-mini (cheap). Rejected: gpt-5, *-codex, *-mini on the 5/5.5
  # lines, o3, o4-mini. So for cheap testing use:  codex_model=gpt-5.4-mini
  codex_model: gpt-5.5
  # Codex reasoning effort: high (serious) | medium | low | minimal (cheap test).
  codex_effort: high

components:
  claude_worker:
    # The prompt below is piped to the CLI's stdin by the framework, and a
    # `finish` command is placed on PATH for the model to signal completion.
    cmd:
      - claude
      - -p                               # headless: read prompt from stdin, print, exit
      - --model
      - "{claude_model}"                 # per-run knob (see top-level inputs)
      # Least-privilege instead of --dangerously-skip-permissions:
      #   acceptEdits  -> auto-approve file writes (so it can create answer.tex)
      #   allowedTools -> the ONLY shell command it may run is `finish`
      # Every other tool/command (rm, curl, reading ~/.ssh, ...) is auto-denied
      # in headless mode. Verified: a `touch /tmp/PWNED` instruction is blocked.
      - --permission-mode
      - acceptEdits
      - --allowedTools
      - Bash(finish:*)
    sandbox:
      backend: subprocess                # host, not Docker
      timeout_s: 1500
    env:
      # The subprocess sandbox pins HOME to the sandbox root, which hides the
      # subscription login. Point HOME back at the real home so the `claude`
      # CLI finds the logged-in Max subscription (no API key needed).
      HOME: /Users/davidholmes
    prompt: |
      You are a research mathematician. Solve the problem below with a complete,
      rigorous proof.

      Problem:
      {problem}

      Instructions:
      1. Write your full solution as a self-contained LaTeX document to a file
         named  answer.tex  in the current directory.
      2. When you are finished, run this exact shell command to signal completion:
           finish '{"status":"done","summary":"proof written to answer.tex"}'
      Work autonomously; do not ask questions.
    input_schema:
      problem: string
      workspace: string
    output_schema:
      workspace: string
      answer_tex: string
      status: string
    output_files:
      answer_tex: answer.tex
    done_outputs:
      status: status
    # NOTE: no `usage:` block — cost parsing only exists for codex_jsonl, so
    # Claude nodes won't report token cost. Fine for a subscription run.

  codex_worker:
    # The "diversity" solver: a SECOND, independent attempt at the same problem
    # using the Codex CLI on David's ChatGPT subscription. Runs in parallel with
    # claude_worker so the referee can compare two genuinely different attempts.
    #
    # Unlike the Claude nodes, Codex does NOT need the real HOME: `copy_codex_auth`
    # copies ~/.codex/auth.json into the sandbox and points CODEX_HOME at it, so
    # auth travels with the sandbox and HOME stays pinned to the sandbox root
    # (i.e. this node is fully filesystem-isolated from ~).
    cmd:
      - codex
      - exec
      - --ignore-user-config   # don't read ~/.codex/config.toml; auth still via CODEX_HOME
      - --skip-git-repo-check
      - --ephemeral            # don't persist session files
      - --json
      - -m
      - "{codex_model}"                            # per-run knob (see top-level inputs)
      - -c
      - model_reasoning_effort="{codex_effort}"    # per-run knob (cheap = low/minimal)
      # (the framework appends `-` so the prompt is read from stdin, and injects
      #  `--sandbox workspace-write` because codex_sandbox: auto + subprocess)
    codex_sandbox: auto        # -> workspace-write on the subprocess backend
    copy_codex_auth: true      # key-free subscription auth (no API key)
    sandbox:
      backend: subprocess
      timeout_s: 1500
    prompt: |
      You are a research mathematician. Solve the problem below with a complete,
      rigorous proof.

      Problem:
      {problem}

      Instructions:
      1. Write your full solution as a self-contained LaTeX document to a file
         named  answer.tex  in the current directory.
      2. When you are finished, run this exact shell command to signal completion:
           finish '{"status":"done","summary":"proof written to answer.tex"}'
      Work autonomously; do not ask questions.
    input_schema:
      problem: string
      workspace: string
    output_schema:
      workspace: string
      answer_tex: string
      status: string
    output_files:
      answer_tex: answer.tex
    done_outputs:
      status: status
    # No `usage:` block on purpose: it would compute a USD cost from token rates
    # and trip the max_usd: 0.0 budget gate. This is a subscription run, so we
    # don't meter it.

  claude_synthesizer:
    # The council editor. Instead of judging and discarding all but one proof, it
    # reads every candidate and writes a SINGLE consolidated best proof that
    # incorporates the strongest ideas from each — so a key idea survives even if
    # the proof it arrived in is otherwise weak. Same subscription-CLI mechanism
    # and least-privilege flags as the solver.
    cmd:
      - claude
      - -p
      - --model
      - "{claude_model}"                 # per-run knob (see top-level inputs)
      - --permission-mode
      - acceptEdits
      - --allowedTools
      - Bash(finish:*)
    sandbox:
      backend: subprocess
      timeout_s: 1500
    env:
      HOME: /Users/davidholmes
    prompt: |
      You are the editor of a mathematics journal assembling the best possible
      proof from several independently produced candidates. You are given a
      problem and candidate proofs (A and B; some candidates may be empty,
      incomplete, or wrong — that is fine).

      Your job is NOT to pick one and discard the rest. It is to produce a single
      consolidated proof that takes the strongest, most rigorous idea from each
      candidate where it helps. If one candidate contributes only a single key
      insight inside an otherwise weak argument, salvage that insight.

      Problem:
      {problem}

      Candidate proof A (LaTeX source):
      {proof_a}

      Candidate proof B (LaTeX source):
      {proof_b}

      Instructions:
      1. Write the consolidated best proof as a complete, self-contained, rigorous
         LaTeX document to a file named  best.tex  in the current directory. Only
         include steps you have actually checked; do not paste a step you cannot
         verify just because a candidate asserted it. The result must stand on its
         own as a correct proof, not a diff against the candidates.
      2. Write a short file  notes.md  recording: a one-line assessment of each
         candidate, and which specific ideas you took from where (call out any key
         idea you salvaged from an otherwise weak candidate).
      3. When you are finished, run this exact shell command to signal completion:
           finish '{"status":"done","summary":"best proof written to best.tex"}'
      Work autonomously; do not ask questions.
    input_schema:
      problem: string
      proof_a: string
      proof_b: string
      workspace: string
    output_schema:
      workspace: string
      best_tex: string
      notes: string
      status: string
    output_files:
      best_tex: best.tex
      notes: notes.md
    done_outputs:
      status: status

dag:
  nodes:
    - id: solve
      kind: agent
      agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
      name: claude_worker
      inputs:
        problem: $input.problem
        claude_model: $input.claude_model
    - id: solve_codex
      kind: agent
      agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
      name: codex_worker
      inputs:
        problem: $input.problem
        codex_model: $input.codex_model
        codex_effort: $input.codex_effort
    - id: synthesize
      kind: agent
      needs: [solve, solve_codex]
      agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
      name: claude_synthesizer
      inputs:
        problem: $input.problem
        claude_model: $input.claude_model
        proof_a: $node.solve.answer_tex
        proof_b: $node.solve_codex.answer_tex
  outputs:
    best_tex: $node.synthesize.best_tex
    synthesis_notes: $node.synthesize.notes
    answer_tex: $node.solve.answer_tex
    answer_tex_codex: $node.solve_codex.answer_tex
    status: $node.synthesize.status
