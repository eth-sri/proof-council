workflow: proofstack.agents.dag_workflow.DAGWorkflow
description: Attention-harness experiment variant 'synth' (prompt-only change from baseline).
budget:
  max_usd: 5.0
  max_tokens: 40000000
  max_tool_calls: 48
  max_wallclock_s: 7200
inputs:
  claude_model: opus
  max_rounds: 6
  problem: ''
components:
  claude_premise:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: "{env:HOME}"
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the PREMISE specialist in a proof-writing council. In a few bullet\npoints, name the key definitions and classical results most relevant to the\nproblem. Be brief and concrete; this is a hint for the author, not a proof. Flag any you are unsure are actually relevant.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your brief to a file named  hint.txt , then run:\n  finish '{\"status\":\"done\",\"summary\":\"premise brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_analogy:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: "{env:HOME}"
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the ANALOGY specialist. In a few bullet points, suggest analogous\nproblems, standard proof templates, or strategies that have worked on\nsimilar problems. Be brief; this is a hint for the author. Flag how promising vs. speculative each suggestion is.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your brief to a file named  hint.txt , then run:\n  finish '{\"status\":\"done\",\"summary\":\"analogy brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_lemma:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: "{env:HOME}"
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the LEMMA specialist. In a few bullet points, list the intermediate\nclaims or sub-lemmas a correct proof would likely need, and flag which look\nhardest, and how confident you are each is needed and true. Be brief; this is a hint for the author.\n\nProblem:\n{problem}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite your brief to a file named  hint.txt , then run:\n  finish '{\"status\":\"done\",\"summary\":\"lemma brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      hint: string
      status: string
    output_files:
      hint: hint.txt
    done_outputs:
      status: status
  claude_synthesize:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: "{env:HOME}"
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the council editor. Three specialists each wrote a brief about this\nproblem. Merge them into ONE short, focused brief for the author. Do NOT just\npick one - integrate the strongest, most useful ideas from each. Keep it\nactionable and concise. Note which ideas look solid vs. speculative.\n\nYour brief MUST open with an explicit, ordered \"DO THIS FIRST\" action list (3-5\nnumbered steps) telling the author the exact sequence to follow - e.g. which\nsmall cases to enumerate by hand before any general claim, then which general\nstructure to aim for, then what to cross-check. Put the highest-leverage,\nmost-certain step first.\n\nProblem:\n{problem}\n\nPremise specialist:\n{premise}\n\nAnalogy specialist:\n{analogy}\n\nLemma specialist:\n{lemma}\n\nWrite the merged brief to a file named  brief.txt , then run:\n  finish '{\"status\":\"done\",\"summary\":\"merged brief\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      premise: string
      analogy: string
      lemma: string
      workspace: string
    output_schema:
      workspace: string
      brief: string
      status: string
    output_files:
      brief: brief.txt
    done_outputs:
      status: status
  claude_author:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: "{env:HOME}"
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are the author/documenter for a mathematical research workflow. Your job\nis to turn the focused brief below into the clearest possible LaTeX progress\ndocument. If the ingredients are enough for a complete proof, write a\ncomplete rigorous proof. If they are not enough, do not pretend they are:\nwrite a clean partial proof, clearly separate established steps from\nconjectural or unfinished steps, and state exactly what remains to be proved.\n\nProblem:\n{problem}\n\nFocused brief (synthesized from the specialists):\n{brief}\n\nCurrent proof attempt (may be empty on round 1):\n{proof}\n\nCritic's feedback from last round (may be empty):\n{memory}\n\nWrite a self-contained LaTeX document to a file named answer.tex. It should\ninclude:\n1. a concise status paragraph saying whether this is a complete proof or a\n   progress report;\n2. the cleanest rigorous argument currently justified by the brief and prior\n   attempt;\n3. a clearly marked section listing the remaining gaps, missing lemmas, or\n   checks still needed.\nThen run:\n  finish '{\"status\":\"done\",\"summary\":\"author progress draft\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      brief: string
      proof: string
      memory: string
      workspace: string
    output_schema:
      workspace: string
      answer_tex: string
      status: string
    output_files:
      answer_tex: answer.tex
    done_outputs:
      status: status
  claude_critic:
    cmd:
    - claude
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --model
    - '{claude_model}'
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Bash(finish:*)
    soft_timeout_s: 780
    sandbox:
      backend: subprocess
      timeout_s: 900
    env:
      HOME: "{env:HOME}"
    cache_enabled: true
    usage:
      type: claude_json
    prompt: "You are a strict referee. Check the proof rigorously for gaps, unjustified\nsteps, false claims, and missing cases.\n\nProblem:\n{problem}\n\nProof to check:\n{proof}\n\nThen do BOTH of these:\n1. Write specific, actionable feedback (what to fix next) to a file named\n   feedback.md .\n2. Write a file named  verdict.txt  containing EXACTLY one word, no\n   punctuation: \"ready\" if this is a complete and correct proof, otherwise\n   \"continue\".\nFinally run:\n  finish '{\"status\":\"done\",\"summary\":\"critique\"}'\nWork autonomously; do not ask questions.\n"
    input_schema:
      problem: string
      proof: string
      workspace: string
    output_schema:
      workspace: string
      verdict: string
      feedback: string
      status: string
    output_files:
      verdict: verdict.txt
      feedback: feedback.md
    done_outputs:
      status: status
dag:
  nodes:
  - id: rounds
    kind: repeat
    max_iterations: $input.max_rounds
    initial_state:
      proof: ''
      memory: ''
      verdict: pending
    condition:
      python: iteration == 0 or inputs.get("verdict", "").strip() != "ready"
    body:
      nodes:
      - id: premise
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_premise
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 328
          y: -336
      - id: analogy
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_analogy
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 350
          y: -138
      - id: lemma
        kind: agent
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_lemma
        inputs:
          problem: $input.problem
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 363
          y: 59
      - id: synthesize
        kind: agent
        needs:
        - premise
        - analogy
        - lemma
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_synthesize
        inputs:
          problem: $input.problem
          premise: $node.premise.hint
          analogy: $node.analogy.hint
          lemma: $node.lemma.hint
        ui:
          x: 1268
          y: -48
      - id: author
        kind: agent
        needs:
        - synthesize
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_author
        inputs:
          problem: $input.problem
          brief: $node.synthesize.brief
          proof: $state.proof
          memory: $state.memory
        ui:
          x: 1758
          y: 132
      - id: critic
        kind: agent
        needs:
        - author
        agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
        name: claude_critic
        inputs:
          problem: $input.problem
          proof: $node.author.answer_tex
        ui:
          x: 2250
          y: 314
      state_updates:
        proof: $node.author.answer_tex
        memory: $node.critic.feedback
        verdict: $node.critic.verdict
    outputs:
      best_tex: $state.proof
      verdict: $state.verdict
      last_feedback: $state.memory
    ui:
      repeat_input:
        x: -72
        y: 83
      repeat_output:
        x: 2808
        y: 53
  outputs:
    best_tex: $node.rounds.best_tex
    verdict: $node.rounds.verdict
    last_feedback: $node.rounds.last_feedback
