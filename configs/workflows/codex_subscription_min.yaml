# Minimal subscription example: solve one problem end-to-end on an OpenAI
# subscription (the `codex` CLI) — NO API key, NO Docker.
#
# This is the Codex twin of claude_subscription_min: a single node drives the
# headless `codex exec` CLI, which solves the problem and writes answer.tex.
# How the subscription path works for Codex differs from Claude:
#   1. Auth travels with the sandbox, not via HOME. `copy_codex_auth: true`
#      copies ~/.codex/auth.json into the sandbox and points CODEX_HOME at it,
#      so the node stays fully filesystem-isolated from your real home (HOME is
#      left pinned to the sandbox root). No API key is used.
#   2. `--ignore-user-config` keeps it from reading ~/.codex/config.toml;
#      `codex_sandbox: auto` injects `--sandbox workspace-write` on the
#      subprocess backend, so it can write answer.tex but not roam the host.
#   3. A pure-subscription run spends $0, and Codex usage is not token-metered
#      here (no `usage:` block), so the guardrails are max_tool_calls,
#      max_wallclock_s, and the per-node timeouts below.
#
# Login once with `codex login` (ChatGPT account). A ChatGPT-account Codex
# login supports the base GPT models but NOT the *-codex variants.
#
# Run it:
#   uv run python scripts/run_workflow.py --workflow codex_subscription_min \
#     --problem "Prove that there are infinitely many primes."
workflow: proofstack.agents.dag_workflow.DAGWorkflow
description: Minimal single-node Codex subscription solver (no API key, no Docker).

budget:
  max_usd: 0.0           # pure subscription run spends $0 (no paid API calls)
  max_tool_calls: 4      # hard cap on CLI spawns per run
  max_wallclock_s: 1800  # 30 min compute backstop

inputs:
  problem: ''
  # Verified working on a ChatGPT-account login: gpt-5.6-sol (top; needs codex
  # CLI >= 0.144 — older CLIs reject it with "requires a newer version of
  # Codex"), gpt-5.5, gpt-5.4, gpt-5.4-mini (cheap test). Rejected: gpt-5,
  # *-codex, *-mini on the 5/5.5 lines, o3, o4-mini.
  codex_model: gpt-5.6-sol
  codex_effort: high     # high (serious) | medium | low | minimal (cheap test);
                         # gpt-5.6-sol also accepts xhigh and max (both verified)

components:
  codex_solver:
    cache_enabled: true   # replay this node from disk on resume (durable runs)
    cmd:
      - codex
      - exec
      - --ignore-user-config   # don't read ~/.codex/config.toml; auth still via CODEX_HOME
      - --skip-git-repo-check
      - --ephemeral            # don't persist session files
      - --json
      - -m
      - "{codex_model}"
      - -c
      - model_reasoning_effort="{codex_effort}"
      # (the framework appends `-` so the prompt is read from stdin, and injects
      #  `--sandbox workspace-write` because codex_sandbox: auto + subprocess)
    codex_sandbox: auto        # -> workspace-write on the subprocess backend
    copy_codex_auth: true      # key-free subscription auth (no API key)
    soft_timeout_s: 780        # 13 min: graceful "wrap up & finish" nudge
    sandbox:
      backend: subprocess      # host, not Docker
      timeout_s: 900           # 15 min: hard kill ceiling for this call
    # Delivery mechanics are auto-appended: with `contract: auto` the framework
    # tells the model which files to write (from output_files) and how to signal
    # completion (the `finish` command), so the prompt describes only the task.
    contract: auto
    prompt: |
      You are a research mathematician. Solve the problem below with a complete,
      rigorous proof, written as a self-contained LaTeX document.

      Problem:
      {problem}
    input_schema:
      problem: string
      workspace: string
    output_schema:
      workspace: string
      answer_tex: string
      status: string
    output_files:
      answer_tex: answer.tex
    done_outputs:
      status: status

dag:
  nodes:
    - id: solve
      kind: agent
      agent: proofstack.agents.configurable_cli.ConfigurableCLIAgent
      name: codex_solver
      inputs:
        problem: $input.problem
  outputs:
    answer_tex: $node.solve.answer_tex
    status: $node.solve.status
